    <style>
      /* ============================================================
         SPACE INVADERS THEME
         ============================================================ */

      /* --- Color palette: neon arcade --- */
      :root {
        --color-primary:    #00ff41;
        --color-accent:     #00ffff;
        --color-bg:         #050508;
        --color-surface:    #0a0e14;
        --color-border:     #00ff4150;
        --color-secondary:  #ff00ff;
        --color-danger:     #ff2244;
        --color-text:       #00ff41;
        --color-text-muted: #00bb30;
        --color-card-bg:    #0a0e14;
        --shadow-sm:  0 0 8px #00ff4120;
        --shadow-md:  0 0 20px #00ff4135;
        --radius:     0px;
        --radius-btn: 0px;
      }

      /* --- Pixel font on key UI elements --- */
      h1, h2, h3,
      .btn, .choice-btn,
      .page-title, .page-title-sub,
      .card,
      .gacha-ball-name, .gacha-ball-label, .gacha-ball-level,
      header, .page-header {
        font-family: 'Press Start 2P', monospace !important;
      }
      h1 { font-size: 0.95rem !important; line-height: 1.8 !important; }
      h2 { font-size: 0.75rem !important; }
      .btn { font-size: 0.62rem !important; letter-spacing: 0.04em !important; }
      .choice-btn { font-size: 0.85rem !important; }
      .page-title { font-size: 0.85rem !important; }
      .page-title-sub { font-size: 0.72rem !important; }
      .card { font-size: 1.1rem !important; }
      .gacha-ball-name { font-size: 0.85rem !important; }
      .gacha-ball-label, .gacha-ball-level { font-size: 0.6rem !important; }

      /* --- Dark background + subtle pixel grid --- */
      body {
        background-color: #050508 !important;
        background-image:
          linear-gradient(rgba(0,255,65,.018) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0,255,65,.018) 1px, transparent 1px) !important;
        background-size: 32px 32px !important;
      }

      /* --- CRT scanlines overlay --- */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background: repeating-linear-gradient(
          to bottom,
          transparent 0px, transparent 3px,
          rgba(0,0,0,.10) 3px, rgba(0,0,0,.10) 4px
        );
        pointer-events: none;
        z-index: 9998;
      }

      /* --- CRT vignette --- */
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,.65) 100%);
        pointer-events: none;
        z-index: 9997;
      }

      /* --- Global text color --- */
      .page, .page * { color: #00ff41; }

      /* --- Buttons: neon green --- */
      .btn {
        background: #050508 !important;
        color: #00ff41 !important;
        border: 2px solid #00ff41 !important;
        box-shadow: 0 0 8px #00ff4155, inset 0 0 6px #00ff410a !important;
        text-transform: uppercase !important;
        transition: box-shadow .15s, background .15s !important;
      }
      .btn:hover:not(:disabled) {
        background: #00ff410f !important;
        box-shadow: 0 0 22px #00ff41aa, inset 0 0 14px #00ff4114 !important;
        transform: none !important;
      }
      .btn:disabled { border-color: #00ff4130 !important; color: #00ff4145 !important; box-shadow: none !important; }

      /* secondary = magenta */
      .btn-secondary {
        color: #ff00ff !important;
        border-color: #ff00ff !important;
        box-shadow: 0 0 8px #ff00ff55 !important;
      }
      .btn-secondary:hover:not(:disabled) {
        background: #ff00ff0f !important;
        box-shadow: 0 0 22px #ff00ffaa !important;
      }

      /* danger = red */
      .btn-danger {
        color: #ff2244 !important;
        border-color: #ff2244 !important;
        box-shadow: 0 0 8px #ff224455 !important;
      }

      /* --- Cards --- */
      .card {
        background: #0a0e14 !important;
        border: 2px solid #00ff4140 !important;
        box-shadow: 0 0 16px #00ff4118 !important;
        color: #00ff41 !important;
      }

      /* --- Choice buttons --- */
      .choice-btn {
        background: #080c10 !important;
        border: 2px solid #00ff4145 !important;
        color: #00ff41 !important;
      }
      .choice-btn:hover:not(:disabled) {
        background: #00ff410a !important;
        border-color: #00ff41 !important;
        box-shadow: 0 0 14px #00ff4166 !important;
        transform: none !important;
      }
      .choice-btn--correct {
        background: #001808 !important;
        border-color: #00ff41 !important;
        box-shadow: 0 0 18px #00ff41aa !important;
        color: #00ff41 !important;
      }
      .choice-btn--incorrect {
        background: #180005 !important;
        border-color: #ff2244 !important;
        box-shadow: 0 0 18px #ff224488 !important;
        color: #ff2244 !important;
      }

      /* --- Progress bar --- */
      .progress-bar {
        background: #00ff411a !important;
        border-radius: 0 !important;
        height: 10px !important;
      }
      .progress-bar-fill {
        background: #00ff41 !important;
        border-radius: 0 !important;
        box-shadow: 0 0 8px #00ff41 !important;
      }

      /* --- Page header --- */
      .page-header { border-bottom: 1px solid #00ff4128 !important; }

      /* --- Text muted --- */
      .text-muted { color: #00bb30 !important; }

      /* --- Input fields --- */
      input {
        background: #0a0e14 !important;
        border: 2px solid #00ff4148 !important;
        color: #00ff41 !important;
        caret-color: #00ff41 !important;
      }
      input:focus {
        border-color: #00ff41 !important;
        box-shadow: 0 0 12px #00ff4166 !important;
        outline: none !important;
      }

      /* --- Gacha machine: neon green --- */
      .gacha-machine {
        background: radial-gradient(145deg, #001608, #002a10 30%, #003818) !important;
        border-color: #00ff41 !important;
        box-shadow: 0 0 0 4px #00ff4130, 0 8px 32px #00ff4140, inset 0 2px 12px #00ff4118 !important;
      }
      .gacha-machine--rolling {
        animation:
          gacha-spin .18s linear infinite,
          gacha-machine-glow .5s ease-in-out infinite alternate,
          gacha-bounce .4s ease-in-out infinite alternate !important;
      }
      @keyframes gacha-machine-glow {
        from { box-shadow: 0 0 0 4px #00ff4130, 0 8px 32px #00ff4140, inset 0 2px 12px #00ff4118; }
        to   { box-shadow: 0 0 56px 24px #00ff41aa, 0 16px 64px #00ff41aa, 0 0 0 14px #00ff4130, inset 0 2px 12px #00ff4166; }
      }
      .gacha-machine-wrap--rolling::before {
        background: radial-gradient(circle, rgba(0,255,65,.45) 0%, rgba(0,255,255,.2) 40%, transparent 70%) !important;
        animation: gacha-aura .4s ease-in-out infinite alternate !important;
      }
      .gacha-machine-wrap--rolling::after {
        content: "";
        position: absolute;
        inset: -52px;
        border-radius: 50%;
        border: 4px solid rgba(0, 255, 65, 0.9);
        animation: gacha-ring-expand .65s ease-out infinite;
        pointer-events: none;
      }
      @keyframes gacha-ring-expand {
        0%   { transform: scale(0.55); opacity: 1; }
        100% { transform: scale(1.25); opacity: 0; }
      }
      @keyframes gacha-bounce {
        from { transform: scale(1.0); }
        to   { transform: scale(1.14); }
      }

      /* --- Gacha result cards: neon rarity --- */
      .gacha-ball-result {
        background: #0a0e14 !important;
      }
      .gacha-ball-result--normal {
        background: #0a0e14 !important;
        border-color: #00ff4155 !important;
        color: #00ff41 !important;
        box-shadow: 0 0 10px #00ff4130 !important;
      }
      .gacha-ball-result--rare {
        background: #05080f !important;
        border-color: #00ffff !important;
        color: #00ffff !important;
        box-shadow: 0 4px 24px #00ffff55 !important;
        position: relative; overflow: hidden;
      }
      .gacha-ball-result--superRare {
        background: #080510 !important;
        border-color: #ff00ff !important;
        color: #ff00ff !important;
        position: relative; overflow: hidden;
        animation:
          gacha-ball-pop .7s cubic-bezier(.34,1.56,.64,1),
          gacha-superrare-neon 1s ease-in-out .8s infinite alternate !important;
      }
      @keyframes gacha-superrare-neon {
        from { box-shadow: 0 4px 24px #ff00ff55; }
        to   { box-shadow: 0 8px 56px #ff00ffcc, 0 0 28px 6px #ff00ffaa; }
      }
      .gacha-ball-result--ultraRare {
        background: #0a0800 !important;
        color: #ffff00 !important;
        position: relative; overflow: hidden;
        animation:
          gacha-ball-pop .7s cubic-bezier(.34,1.56,.64,1),
          gacha-ultra-rainbow 2s linear .8s infinite !important;
      }
      .gacha-ball-result--legend {
        background: #0a0008 !important;
        color: #ff00cc !important;
        position: relative; overflow: hidden;
        animation:
          gacha-ball-pop .4s cubic-bezier(.34,1.9,.64,1),
          gacha-legend-neon 1.4s ease-in-out .5s infinite alternate !important;
      }
      @keyframes gacha-legend-neon {
        0%   { border-color: #ff0080; box-shadow: 0 4px 28px #ff008099; filter: brightness(1);   transform: scale(1);    }
        33%  { border-color: #ff8c00; box-shadow: 0 8px 56px #ff8c00cc; filter: brightness(1.18); }
        66%  { border-color: #ffff00; box-shadow: 0 8px 56px #ffff00cc; filter: brightness(1.22); }
        100% { border-color: #ff0080;
               box-shadow: 0 12px 72px #ff0080ff, 0 0 56px 14px #ff008044;
               filter: brightness(1.35) drop-shadow(0 0 20px #ff0080);
               transform: scale(1.04); }
      }

      /* --- Ball pop: dramatic bounce (override) --- */
      @keyframes gacha-ball-pop {
        0%   { transform: scale(0.1) rotate(-30deg) translateY(30px); opacity: 0; }
        55%  { transform: scale(1.28) rotate(8deg) translateY(-6px);  opacity: 1; }
        75%  { transform: scale(0.92) rotate(-3deg) translateY(2px); }
        90%  { transform: scale(1.06) rotate(1deg); }
        100% { transform: scale(1) rotate(0deg) translateY(0); opacity: 1; }
      }

      /* --- Shimmer scan lines per rarity --- */
      @keyframes gacha-shimmer { from { left: -80%; } to { left: 160%; } }

      .gacha-ball-result--rare::after,
      .gacha-ball-result--superRare::after,
      .gacha-ball-result--ultraRare::after,
      .gacha-ball-result--legend::after {
        content: "";
        position: absolute;
        top: 0; left: -80%; width: 55%; height: 100%;
        pointer-events: none;
      }
      .gacha-ball-result--rare::after      { background: linear-gradient(105deg, transparent, rgba(0,255,255,.35), transparent);  animation: gacha-shimmer 2.8s linear .9s infinite; }
      .gacha-ball-result--superRare::after { background: linear-gradient(105deg, transparent, rgba(255,0,255,.35), transparent);  animation: gacha-shimmer 1.8s linear .8s infinite; }
      .gacha-ball-result--ultraRare::after { background: linear-gradient(105deg, transparent, rgba(255,255,0,.4),  transparent);  animation: gacha-shimmer 1.3s linear .8s infinite; }
      .gacha-ball-result--legend::after    { background: linear-gradient(105deg, transparent, rgba(255,0,128,.5),  transparent);  animation: gacha-shimmer .75s linear .5s infinite;  }

      /* --- Ultra rainbow cycling --- */
      @keyframes gacha-ultra-rainbow {
        0%   { border-color: #ffff00; box-shadow: 0 0 24px 6px #ffff00aa; }
        20%  { border-color: #ff8800; box-shadow: 0 0 24px 6px #ff8800aa; }
        40%  { border-color: #ff0040; box-shadow: 0 0 24px 6px #ff0040aa; }
        60%  { border-color: #00ffff; box-shadow: 0 0 24px 6px #00ffffaa; }
        80%  { border-color: #ff00ff; box-shadow: 0 0 24px 6px #ff00ffaa; }
        100% { border-color: #ffff00; box-shadow: 0 0 24px 6px #ffff00aa; }
      }

      /* --- Page title neon glow --- */
      .page-title {
        color: #00ffff !important;
        text-shadow: 0 0 10px #00ffff88, 0 0 24px #00ffff44 !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // =====================================================================
      // Fix ghost hover: 選択肢クリック直後に次の問題の選択肢がhover状態になるのを防ぐ
      // =====================================================================
      document.addEventListener('click', function(e) {
        if (!e.target.closest('.choice-btn')) return;
        var grid = document.querySelector('.choices-grid');
        if (!grid) return;
        grid.style.pointerEvents = 'none';
        document.addEventListener('mousemove', function restore() {
          var g = document.querySelector('.choices-grid');
          if (g) g.style.pointerEvents = '';
          document.removeEventListener('mousemove', restore);
        });
      }, true);

      // =====================================================================
      // アイテムコレクション & ボーダー表示
      // =====================================================================
      (function () {
        // --- 定数 ---
        var ITEMS = {
          normal:    { emoji: '👾', label: 'ノーマル',     color: '#00ff41' },
          rare:      { emoji: '🛸', label: 'レア',         color: '#00ffff' },
          superRare: { emoji: '🚀', label: 'スーパーレア', color: '#ff00ff' },
          ultraRare: { emoji: '⭐', label: 'ウルトラレア', color: '#ffff00' },
          legend:    { emoji: '👑', label: 'レジェンド',   color: '#ff0080' },
        };
        var RARITY_ORDER = ['normal', 'rare', 'superRare', 'ultraRare', 'legend'];
        var MAX_BORDER = 20;
        var KEY_ITEMS  = 'kuku_items';
        var KEY_BORDER = 'kuku_border';

        // --- localStorage ユーティリティ ---
        function loadItems() {
          try { return JSON.parse(localStorage.getItem(KEY_ITEMS) || '{}'); } catch(e) { return {}; }
        }
        function saveItems(items) {
          localStorage.setItem(KEY_ITEMS, JSON.stringify(items));
        }
        function loadBorder() {
          try { return JSON.parse(localStorage.getItem(KEY_BORDER) || '[]'); } catch(e) { return []; }
        }
        function saveBorder(border) {
          localStorage.setItem(KEY_BORDER, JSON.stringify(border));
        }
        function countOf(items, type) { return items[type] || 0; }

        // --- ガチャ検知: localStorage.setItem をインターセプト ---
        var _origSetItem = Storage.prototype.setItem;
        var prevLevel = parseInt(localStorage.getItem('kuku_level') || '1', 10);

        Storage.prototype.setItem = function(key, value) {
          _origSetItem.call(this, key, value);
          if (this !== localStorage) return;
          if (key === 'kuku_level') {
            var newLevel = parseInt(value, 10);
            var diff = newLevel - prevLevel;
            prevLevel = newLevel;
            if (diff > 0) {
              var rarity = diff >= 100 ? 'legend'
                         : diff >= 30  ? 'ultraRare'
                         : diff >= 10  ? 'superRare'
                         : diff >= 3   ? 'rare'
                         :               'normal';
              var items = loadItems();
              items[rarity] = (items[rarity] || 0) + 1;
              saveItems(items);
              renderBorder();
              showItemToast(rarity);
            }
          }
        };

        // --- トースト通知 ---
        function showItemToast(type) {
          var def = ITEMS[type];
          var toast = document.createElement('div');
          toast.textContent = def.emoji + ' ' + def.label + ' をゲット！';
          toast.style.cssText = [
            'position:fixed', 'bottom:80px', 'left:50%', 'transform:translateX(-50%)',
            'background:#0a0e14', 'color:' + def.color,
            'border:2px solid ' + def.color,
            'box-shadow:0 0 16px ' + def.color + '88',
            'padding:10px 20px', 'font-family:"Press Start 2P",monospace',
            'font-size:0.6rem', 'z-index:10000', 'white-space:nowrap',
            'animation:toast-in .3s ease',
          ].join(';');
          document.body.appendChild(toast);
          setTimeout(function() {
            toast.style.transition = 'opacity .4s';
            toast.style.opacity = '0';
            setTimeout(function() { toast.remove(); }, 400);
          }, 2000);
        }

        // --- ボーダーレンダリング ---
        var borderEl = null;
        function renderBorder() {
          if (!borderEl) return;
          var border = loadBorder();
          borderEl.innerHTML = '';

          var isWide = window.innerWidth > 460;
          var slots = isWide ? MAX_BORDER : Math.min(MAX_BORDER / 2, 10);

          border.slice(0, slots).forEach(function(entry, i) {
            var def = ITEMS[entry.type];
            if (!def) return;
            var item = document.createElement('div');
            item.className = 'kuku-border-item';
            item.textContent = def.emoji;
            item.title = def.label;
            item.style.color = def.color;
            item.style.textShadow = '0 0 8px ' + def.color;
            item.dataset.idx = i;

            // 配置座標
            var pos = getSlotPos(i, slots, isWide);
            item.style.left = pos.x + 'px';
            item.style.top  = pos.y + 'px';

            borderEl.appendChild(item);
          });
        }

        function getSlotPos(i, total, isWide) {
          if (isWide) {
            // 左右の余白に縦並び
            var half = Math.ceil(total / 2);
            if (i < half) {
              // 左側
              var margin = (window.innerWidth - Math.min(window.innerWidth, 420)) / 2;
              return { x: Math.max(4, margin - 48), y: 60 + i * 52 };
            } else {
              // 右側
              var marginR = (window.innerWidth + Math.min(window.innerWidth, 420)) / 2;
              return { x: Math.min(window.innerWidth - 44, marginR + 8), y: 60 + (i - half) * 52 };
            }
          } else {
            // 上部に横並び
            return { x: 8 + i * 44, y: 8 };
          }
        }

        function removeFromBorder(idx) {
          var border = loadBorder();
          if (idx < 0 || idx >= border.length) return;
          border.splice(idx, 1);
          saveBorder(border);
          renderBorder();
          renderPanel();
        }

        function removeLastFromBorder(type) {
          var border = loadBorder();
          // 同じタイプで最後に追加したものを1つ外す
          for (var i = border.length - 1; i >= 0; i--) {
            if (border[i].type === type) {
              border.splice(i, 1);
              break;
            }
          }
          saveBorder(border);
          renderBorder();
          renderPanel();
        }

        // --- コレクションパネル ---
        var panelEl  = null;
        var panelOpen = false;

        function renderPanel() {
          if (!panelEl || !panelOpen) return;
          var items  = loadItems();
          var border = loadBorder();

          var html = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">'
            + '<span>コレクション</span>'
            + '<button id="kuku-panel-close" style="background:none;border:none;color:#00ff41;font-family:inherit;font-size:1.2rem;cursor:pointer;line-height:1">✕</button>'
            + '</div>';

          RARITY_ORDER.forEach(function(type) {
            var def   = ITEMS[type];
            var count = countOf(items, type);
            var inBorder = border.filter(function(b) { return b.type === type; }).length;
            var canAdd = count > inBorder && border.length < MAX_BORDER;

            var canRemove = inBorder > 0;
            html += '<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #00ff4120">'
              + '<span style="font-size:1.6rem">' + def.emoji + '</span>'
              + '<div style="flex:1">'
              +   '<div style="color:' + def.color + ';font-size:0.55rem;margin-bottom:2px">' + def.label + '</div>'
              +   '<div style="font-size:0.5rem;color:#00bb30">所持: ' + count + '  表示中: ' + inBorder + '</div>'
              + '</div>'
              + '<button data-remove="' + type + '" '
              +   'style="font-family:inherit;font-size:0.5rem;padding:6px 8px;'
              +   'background:#0a0e14;border:1px solid ' + (canRemove ? '#ff2244' : '#333') + ';'
              +   'color:' + (canRemove ? '#ff2244' : '#444') + ';cursor:' + (canRemove ? 'pointer' : 'default') + '"'
              +   (canRemove ? '' : ' disabled') + '>'
              +   '- 外す'
              + '</button>'
              + '<button data-add="' + type + '" '
              +   'style="font-family:inherit;font-size:0.5rem;padding:6px 8px;'
              +   'background:#0a0e14;border:1px solid ' + (canAdd ? def.color : '#333') + ';'
              +   'color:' + (canAdd ? def.color : '#444') + ';cursor:' + (canAdd ? 'pointer' : 'default') + '"'
              +   (canAdd ? '' : ' disabled') + '>'
              +   '+ 飾る'
              + '</button>'
              + '</div>';
          });

          panelEl.innerHTML = html;

          document.getElementById('kuku-panel-close').onclick = function() {
            panelOpen = false;
            panelEl.style.display = 'none';
          };

          panelEl.querySelectorAll('[data-add]').forEach(function(btn) {
            btn.addEventListener('click', function() {
              addToBorder(this.dataset.add);
            });
          });

          panelEl.querySelectorAll('[data-remove]').forEach(function(btn) {
            btn.addEventListener('click', function() {
              removeLastFromBorder(this.dataset.remove);
            });
          });
        }

        function addToBorder(type) {
          var items  = loadItems();
          var border = loadBorder();
          var inBorder = border.filter(function(b) { return b.type === type; }).length;
          if (countOf(items, type) <= inBorder) return;
          if (border.length >= MAX_BORDER) return;
          border.push({ type: type, id: type + '-' + Date.now() });
          saveBorder(border);
          renderBorder();
          renderPanel();
        }

        // --- 初期化 ---
        document.addEventListener('DOMContentLoaded', function() {
          // トーストアニメーション
          var styleEl = document.createElement('style');
          styleEl.textContent = '@keyframes toast-in{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}';
          document.head.appendChild(styleEl);

          // ボーダーオーバーレイ
          borderEl = document.createElement('div');
          borderEl.id = 'kuku-border-overlay';
          borderEl.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:10001';
          document.body.appendChild(borderEl);

          // ボーダーアイテムのスタイル
          var itemStyle = document.createElement('style');
          itemStyle.textContent = '.kuku-border-item{'
            + 'position:absolute;font-size:1.6rem;cursor:pointer;'
            + 'pointer-events:auto;transition:transform .15s;'
            + 'user-select:none;line-height:1'
            + '}'
            + '.kuku-border-item:hover{transform:scale(1.3)}';
          document.head.appendChild(itemStyle);

          // コレクションボタン
          var btn = document.createElement('button');
          btn.id = 'kuku-collection-btn';
          btn.textContent = '👾';
          btn.title = 'コレクション';
          btn.style.cssText = [
            'position:fixed', 'bottom:16px', 'right:16px',
            'width:48px', 'height:48px', 'border-radius:0',
            'background:#0a0e14', 'border:2px solid #00ff41',
            'color:#00ff41', 'font-size:1.4rem',
            'box-shadow:0 0 12px #00ff4166',
            'cursor:pointer', 'z-index:10001',
            'display:flex', 'align-items:center', 'justify-content:center',
          ].join(';');
          document.body.appendChild(btn);

          // コレクションパネル
          panelEl = document.createElement('div');
          panelEl.id = 'kuku-collection-panel';
          panelEl.style.cssText = [
            'position:fixed', 'bottom:72px', 'right:16px',
            'width:280px', 'background:#0a0e14',
            'border:2px solid #00ff41',
            'box-shadow:0 0 24px #00ff4155',
            'padding:16px',
            'font-family:"Press Start 2P",monospace',
            'font-size:0.6rem', 'color:#00ff41',
            'z-index:10001', 'display:none',
            'max-height:70vh', 'overflow-y:auto',
          ].join(';');
          document.body.appendChild(panelEl);

          btn.addEventListener('click', function() {
            panelOpen = !panelOpen;
            panelEl.style.display = panelOpen ? 'block' : 'none';
            if (panelOpen) renderPanel();
          });

          // ウィンドウリサイズ対応
          window.addEventListener('resize', renderBorder);

          // 初期描画
          renderBorder();
        });
      })();
    </script>
  </body>
</html>
